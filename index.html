<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>CODEA VR - Isla de los Algoritmos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script>
    // =======================
    // Utils & Haptics
    // =======================
    const V3 = THREE.Vector3;

    function worldPosOf(el) {
      const v = new V3();
      if (el.object3D) el.object3D.getWorldPosition(v);
      return v;
    }

    function triggerVibration(controllerEl, intensity = 0.5, duration = 100) {
      const gamepad = controllerEl.components['tracked-controls'] && 
                      controllerEl.components['tracked-controls'].controller;
      if (gamepad && gamepad.hapticActuators && gamepad.hapticActuators.length > 0) {
        gamepad.hapticActuators[0].pulse(intensity, duration);
      }
    }

    function getText(blockEl) {
      return blockEl.getAttribute("data-text") || "";
    }

    function climbTo(el, attrName, steps = 10) {
      let cur = el;
      for (let i=0; i<steps && cur; i++) {
        if (cur.hasAttribute && cur.hasAttribute(attrName)) return cur;
        cur = cur.parentElement;
      }
      return null;
    }

    // =======================
    // Componentes de Interacción
    // =======================
    AFRAME.registerComponent("ui-button", {
      schema: { action: { type: "string" }, label: { type: "string" } },
      init() {
        this.el.classList.add("clickable");
        const t = document.createElement("a-text");
        t.setAttribute("value", this.data.label);
        t.setAttribute("align", "center");
        t.setAttribute("color", "#fff");
        t.setAttribute("width", "2.2");
        t.setAttribute("position", "0 0 0.02");
        this.el.appendChild(t);

        this.el.addEventListener("mouseenter", () => this.el.setAttribute("material", "color", "#3b82f6"));
        this.el.addEventListener("mouseleave", () => this.el.setAttribute("material", "color", "#1f2937"));
      }
    });

    AFRAME.registerComponent("controller-logic", {
      init() {
        this.grabbed = null;

        // Click en botones
        this.el.addEventListener("triggerdown", () => {
          const ray = this.el.components.raycaster;
          if (!ray || !ray.intersections.length) return;
          const hit = ray.intersections[0].object.el;
          const btn = climbTo(hit, "ui-button");
          if (btn) {
            triggerVibration(this.el, 0.8, 50);
            btn.emit("ui-click");
          }
        });

        // Agarre de bloques
        this.el.addEventListener("gripdown", () => {
          const ray = this.el.components.raycaster;
          if (!ray || !ray.intersections.length) return;
          const b = climbTo(ray.intersections[0].object.el, "code-block");
          if (b) {
            triggerVibration(this.el, 0.4, 80);
            this.grabbed = b;
            this.el.appendChild(b);
            b.setAttribute("position", "0 0 -0.15");
            b.setAttribute("rotation", "0 0 0");
          }
        });

        this.el.addEventListener("gripup", () => {
          if (!this.grabbed) return;
          const b = this.grabbed;
          this.grabbed = null;
          const app = document.querySelector("[app-manager]").components["app-manager"];
          
          if (app.trySnap(b)) {
            triggerVibration(this.el, 1.0, 150); // Vibración fuerte al encajar
          } else {
            document.querySelector("#paletteBlocks").appendChild(b);
            b.setAttribute("position", b.getAttribute("data-homepos"));
          }
        });
      }
    });

    AFRAME.registerComponent("slot", {
      schema: { index: { type: "int" } },
      init() { this.filled = false; }
    });

    // =======================
    // App Manager
    // =======================
    AFRAME.registerComponent("app-manager", {
      init() {
        this.groups = {
          menu: document.querySelector("#groupMenu"),
          levels: document.querySelector("#groupLevels"),
          level1: document.querySelector("#groupLevel1")
        };
        this.uiTitle = document.querySelector("#hudTitle");
        this.uiBody = document.querySelector("#hudBody");
        this.console = document.querySelector("#consoleText");
        this.program = document.querySelector("#programLine");
        this.expected = ['print(', '"Hello World"', ')'];
        this.state = [null, null, null];

        document.querySelectorAll("[ui-button]").forEach(btn => {
          btn.addEventListener("ui-click", () => this.onUIButton(btn.getAttribute("ui-button").action));
        });

        this.show("menu");
        this.setHUD("CODEA VR", "Gatillo para botones.\nGrip (lateral) para agarrar bloques.");
      },

      show(name) {
        Object.entries(this.groups).forEach(([k, el]) => el.setAttribute("visible", k === name));
      },

      onUIButton(action) {
        if (action === "start") this.show("levels");
        if (action === "backToMenu") this.show("menu");
        if (action === "lvl1") { this.resetLevel1(); this.show("level1"); }
        if (action === "backToLevels") this.show("levels");
      },

      setHUD(t, b) { this.uiTitle.setAttribute("text", "value", t); this.uiBody.setAttribute("text", "value", b); },
      
      resetLevel1() {
        this.state = [null, null, null];
        document.querySelector("#badge").setAttribute("visible", "false");
        document.querySelectorAll("[slot]").forEach(s => s.components.slot.filled = false);
        const palette = document.querySelector("#paletteBlocks");
        ["blk_print","blk_text","blk_close"].forEach(id => {
          const b = document.querySelector("#"+id);
          palette.appendChild(b);
          b.setAttribute("position", b.getAttribute("data-homepos"));
          b.setAttribute("material", "color: #2563eb");
        });
        this.renderProgram();
      },

      renderProgram() {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const parts = [0,1,2].map(i => {
          const s = slots.find(x => x.getAttribute("slot").index === i);
          const child = s ? s.querySelector("[code-block]") : null;
          return child ? getText(child) : "___";
        });
        this.program.setAttribute("text", "value", parts.join(" "));
      },

      trySnap(blockEl) {
        const slots = Array.from(document.querySelectorAll("#boardSlots [slot]"));
        const p = worldPosOf(blockEl);
        let best=null, bestD=999;

        slots.forEach(s => {
          if (s.components.slot.filled) return;
          const d = worldPosOf(s).distanceTo(p);
          if (d < bestD) { bestD = d; best = s; }
        });

        if (!best || bestD > 0.4) return false;

        const idx = best.getAttribute("slot").index;
        best.appendChild(blockEl);
        blockEl.setAttribute("position", "0 0 0.1");
        best.components.slot.filled = true;

        if (getText(blockEl) === this.expected[idx]) {
          blockEl.setAttribute("material", "color: #22c55e");
          this.state[idx] = "ok";
          this.checkWin();
        } else {
          blockEl.setAttribute("material", "color: #ef4444");
          setTimeout(() => this.resetSlot(idx), 800);
        }
        this.renderProgram();
        return true;
      },

      resetSlot(idx) {
        const s = Array.from(document.querySelectorAll("[slot]")).find(x => x.getAttribute("slot").index === idx);
        const b = s ? s.querySelector("[code-block]") : null;
        if (b) {
          s.components.slot.filled = false;
          document.querySelector("#paletteBlocks").appendChild(b);
          b.setAttribute("position", b.getAttribute("data-homepos"));
          b.setAttribute("material", "color: #2563eb");
          this.renderProgram();
        }
      },

      checkWin() {
        if (this.state.every(x => x === "ok")) {
          document.querySelector("#badge").setAttribute("visible", "true");
          this.console.setAttribute("text", "value", "> print(\"Hello World\")\n> Hello World\n> ¡ÉXITO!");
        }
      }
    });
  </script>
</head>

<body>
  <a-scene background="color: #0b1020" renderer="antialias: true" webxr="optionalFeatures: hand-tracking, local-floor;">
    
    <a-entity id="rig" position="0 0 1.5">
      <a-camera id="cam" look-controls wasd-controls position="0 1.6 0"></a-camera>
      <a-entity laser-controls="hand: right" raycaster="objects: .grabbable, .clickable; far: 4" line="color: #4ade80" controller-logic></a-entity>
      <a-entity laser-controls="hand: left" raycaster="objects: .grabbable, .clickable; far: 4" line="color: #4ade80" controller-logic></a-entity>
    </a-entity>

    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="1 4 2"></a-entity>

    <a-entity position="0 2.5 -1.5" app-manager>
      <a-plane width="2.8" height="0.6" color="#1e293b" opacity="0.9"></a-plane>
      <a-text id="hudTitle" value="Cargando..." position="-1.3 0.15 0.01" width="2.5" color="#93c5fd"></a-text>
      <a-text id="hudBody" value="..." position="-1.3 -0.05 0.01" width="2.2" wrap-count="60"></a-text>
    </a-entity>

    <a-entity position="-2 1.5 -1.5" rotation="0 30 0">
      <a-plane width="1.4" height="1.2" color="#000"></a-plane>
      <a-text value="CONSOLA" position="-0.6 0.5 0.01" width="2" color="#93c5fd"></a-text>
      <a-text id="consoleText" value="> Ready" position="-0.6 0.3 0.01" width="1.8" color="#4ade80"></a-text>
    </a-entity>

    <a-entity id="groupMenu" position="0 1.5 -1">
      <a-plane width="2" height="1" color="#1e293b" opacity="0.95"></a-plane>
      <a-text value="Misión Código: Isla Algoritmos" align="center" position="0 0.3 0.01" width="3"></a-text>
      <a-plane ui-button="action: start; label: INICIAR" position="0 -0.2 0.05" width="0.8" height="0.3" material="color:#1f2937"></a-plane>
    </a-entity>

    <a-entity id="groupLevels" visible="false" position="0 1.5 -1">
      <a-plane width="2" height="1" color="#1e293b"></a-plane>
      <a-plane ui-button="action: lvl1; label: NIVEL 1" position="0 0.2 0.05" width="0.8" height="0.25" material="color:#1f2937"></a-plane>
      <a-plane ui-button="action: backToMenu; label: VOLVER" position="0 -0.3 0.05" width="0.6" height="0.15" material="color:#ef4444"></a-plane>
    </a-entity>

    <a-entity id="groupLevel1" visible="false">
      <a-entity position="0 1.5 -1.2">
        <a-plane width="2.4" height="1.6" color="#0f172a"></a-plane>
        <a-entity id="boardSlots" position="0 -0.1 0.02">
          <a-box slot="index: 0" position="-0.8 0.4 0" width="0.7" height="0.2" depth="0.05" material="color:#334155"></a-box>
          <a-box slot="index: 1" position="0 0.4 0" width="0.8" height="0.2" depth="0.05" material="color:#334155"></a-box>
          <a-box slot="index: 2" position="0.7 0.4 0" width="0.3" height="0.2" depth="0.05" material="color:#334155"></a-box>
        </a-entity>
        <a-text id="programLine" value="___ ___ ___" align="center" position="0 -0.4 0.1" width="4" color="#4ade80"></a-text>
        <a-text id="badge" value="¡LOGRADO!" visible="false" align="center" position="0 0.6 0.1" color="yellow" width="5"></a-text>
        <a-plane ui-button="action: backToLevels; label: SALIR" position="-0.9 -0.6 0.05" width="0.4" height="0.15" material="color:#ef4444"></a-plane>
      </a-entity>

      <a-entity id="paletteBlocks" position="1.8 1.5 -1.2" rotation="0 -30 0">
        <a-plane width="1" height="1.6" color="#1e293b"></a-plane>
        <a-text value="BLOQUES" align="center" position="0 0.7 0.01" width="2"></a-text>
        
        <a-entity id="blk_print" class="grabbable" code-block data-text="print(" data-homepos="0 0.4 0.05"
                  geometry="primitive: box; width: 0.6; height: 0.18; depth: 0.05" material="color:#2563eb" position="0 0.4 0.05">
          <a-text value="print(" align="center" position="0 0 0.06" width="2.5"></a-text>
        </a-entity>

        <a-entity id="blk_text" class="grabbable" code-block data-text='"Hello World"' data-homepos="0 0 0.05"
                  geometry="primitive: box; width: 0.8; height: 0.18; depth: 0.05" material="color:#2563eb" position="0 0 0.05">
          <a-text value='"Hello World"' align="center" position="0 0 0.06" width="2.5"></a-text>
        </a-entity>

        <a-entity id="blk_close" class="grabbable" code-block data-text=")" data-homepos="0 -0.4 0.05"
                  geometry="primitive: box; width: 0.25; height: 0.18; depth: 0.05" material="color:#2563eb" position="0 -0.4 0.05">
          <a-text value=")" align="center" position="0 0 0.06" width="2.5"></a-text>
        </a-entity>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
