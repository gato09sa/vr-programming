<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Quest Puzzle: print("Hello World")</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script>
    const WORLD_UP = new THREE.Vector3(0, 1, 0);

    function getText(el) { return el.getAttribute("data-text"); }

    // --- Grab con rayo: gatillo para agarrar el objeto intersectado
    AFRAME.registerComponent("ray-grabber", {
      schema: { hand: { type: "string", default: "right" } },
      init() {
        this.raycaster = this.el.components.raycaster;
        this.grabbedEl = null;
        this.originalParent = null;

        // gatillo (Oculus/Quest controllers)
        this.el.addEventListener("triggerdown", () => this.tryGrab());
        this.el.addEventListener("triggerup", () => this.release());

        // fallback (algunos setups disparan gripdown)
        this.el.addEventListener("gripdown", () => this.tryGrab());
        this.el.addEventListener("gripup", () => this.release());
      },

      tryGrab() {
        if (this.grabbedEl) return;
        if (!this.raycaster) return;

        const hits = this.raycaster.intersections;
        if (!hits || hits.length === 0) return;

        const hitEl = hits[0].object.el;
        if (!hitEl || !hitEl.hasAttribute("code-block")) return;

        this.grabbedEl = hitEl;
        this.originalParent = hitEl.parentNode;

        // Adjuntar al controlador (se mueve contigo)
        this.el.object3D.add(hitEl.object3D);
        hitEl.object3D.position.set(0, 0, -0.18); // delante del control
        hitEl.object3D.rotation.set(0, 0, 0);

        hitEl.emit("grabbed");
      },

      release() {
        if (!this.grabbedEl) return;

        const el = this.grabbedEl;

        // Si está cerca de una ranura, la ranura lo “absorbe”.
        // Si no, vuelve a la mesa.
        const gm = document.querySelector("[game-manager]").components["game-manager"];
        const droppedInto = gm.tryDropIntoNearestSlot(el);

        if (!droppedInto) {
          // vuelve a la mesa a su homepos
          const table = document.querySelector("#table");
          table.appendChild(el);
          el.setAttribute("position", el.getAttribute("data-homepos"));
          el.setAttribute("rotation", "0 0 0");
          el.setAttribute("material", "color: #2563eb; roughness: 0.4");
        }

        el.emit("released");
        this.grabbedEl = null;
        this.originalParent = null;
      }
    });

    // --- Slot: almacena 1 bloque
    AFRAME.registerComponent("slot", {
      schema: { index: { type: "int" } },
      init() {
        this.filled = false;
      }
    });

    // --- Game manager: explicación + validación + “console”
    AFRAME.registerComponent("game-manager", {
      init() {
        this.steps = ['print(', '"Hello World"', ')'];
        this.slotState = [null, null, null];

        this.uiTitle = document.querySelector("#uiTitle");
        this.uiBody  = document.querySelector("#uiBody");
        this.console = document.querySelector("#console");
        this.program = document.querySelector("#programLine");
        this.badge   = document.querySelector("#badge");

        this.setUI(
          "Nivel 1: arma tu primer programa",
          "Usa el rayo (laser) del control y el gatillo para agarrar.\n" +
          "Orden correcto:\nprint(  \"Hello World\"  )\n\n" +
          "Coloca cada bloque en su ranura."
        );
        this.setConsole("> Consola lista.\n");
        this.renderProgram();
      },

      setUI(title, body) {
        this.uiTitle.setAttribute("text", "value", title);
        this.uiBody.setAttribute("text", "value", body);
      },

      setConsole(text) { this.console.setAttribute("text", "value", text); },
      addConsole(line) {
        const cur = this.console.getAttribute("text").value;
        this.setConsole(cur + line);
      },

      expectedForIndex(i){ return this.steps[i]; },

      // Busca ranura más cercana; si está dentro del radio y no ocupada, encaja.
      tryDropIntoNearestSlot(blockEl) {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const blockPos = new THREE.Vector3();
        blockEl.object3D.getWorldPosition(blockPos);

        let best = null;
        let bestDist = 999;

        for (const s of slots) {
          const comp = s.components.slot;
          if (comp.filled) continue;

          const slotPos = new THREE.Vector3();
          s.object3D.getWorldPosition(slotPos);

          const d = slotPos.distanceTo(blockPos);
          if (d < bestDist) { bestDist = d; best = s; }
        }

        // radio de “snap”
        if (!best || bestDist > 0.35) return false;

        // Encajar
        const idx = best.getAttribute("slot").index;
        best.appendChild(blockEl);
        blockEl.setAttribute("position", "0 0.10 0");
        blockEl.setAttribute("rotation", "0 0 0");

        best.components.slot.filled = true;

        // Validar
        const expected = this.expectedForIndex(idx);
        const actual = getText(blockEl);

        if (actual === expected) {
          blockEl.setAttribute("material", "color: #22c55e; roughness: 0.4");
          this.slotState[idx] = "ok";
          this.explainCorrect(idx);
        } else {
          blockEl.setAttribute("material", "color: #ef4444; roughness: 0.4");
          this.slotState[idx] = "bad";
          this.explainWrong(idx, expected, actual);

          // Reset automático a los 1.2s
          setTimeout(() => this.resetSlot(idx), 1200);
        }

        this.renderProgram();
        this.checkWin();
        return true;
      },

      renderProgram() {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const parts = [];

        for (let i = 0; i < 3; i++) {
          const s = slots.find(x => x.getAttribute("slot").index === i);
          const child = s.querySelector("[code-block]");
          parts.push(child ? getText(child) : "___");
        }

        // sin espacios raros
        this.program.setAttribute("text", "value", parts.join(" "));
      },

      explainCorrect(index) {
        if (index === 0) {
          this.setUI("✅ Bien: print(", "print() es una función.\nSirve para mostrar algo en la consola.\n\nAhora pon el texto dentro y luego cierra con ).");
        } else if (index === 1) {
          this.setUI("✅ Bien: \"Hello World\"", "Esto es texto (cadena).\nLo que pongas entre comillas es lo que saldrá impreso.");
        } else {
          this.setUI("✅ Bien: )", "Con ) cierras el print(...).\nSin cerrar, el programa queda incompleto.");
        }
      },

      explainWrong(index, expected, actual) {
        let msg =
          `❌ No va aquí.\n\n` +
          `Esperado: ${expected}\n` +
          `Pusiste:  ${actual}\n\n`;

        if (index === 0) msg += "Pista: primero va el comando que hace la acción.";
        if (index === 1) msg += "Pista: en el centro va lo que quieres imprimir.";
        if (index === 2) msg += "Pista: al final se cierra el paréntesis.";

        this.setUI("Intenta otra vez", msg);
      },

      resetSlot(index) {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const s = slots.find(x => x.getAttribute("slot").index === index);
        const b = s.querySelector("[code-block]");
        if (!b) return;

        // liberar ranura
        s.components.slot.filled = false;
        this.slotState[index] = null;

        // devolver bloque
        const table = document.querySelector("#table");
        table.appendChild(b);
        b.setAttribute("position", b.getAttribute("data-homepos"));
        b.setAttribute("rotation", "0 0 0");
        b.setAttribute("material", "color: #2563eb; roughness: 0.4");

        this.renderProgram();
      },

      checkWin() {
        if (!this.slotState.every(x => x === "ok")) return;

        this.badge.setAttribute("visible", "true");
        this.addConsole("\n> Ejecutando: print(\"Hello World\")\n");
        this.addConsole("Hello World\n");
        this.addConsole("> OK\n");

        this.setUI(
          "🎉 Nivel 1 completado",
          "Formaste:\nprint(\"Hello World\")\n\nResumen:\n- print(...) muestra algo en consola\n- \"Hello World\" es el contenido\n- ( y ) encierran los argumentos"
        );
      }
    });

    // --- Hacer que textos siempre miren a la cámara (más legible en VR)
    AFRAME.registerComponent("billboard", {
      init() { this.cam = document.querySelector("#cam").object3D; },
      tick() {
        const obj = this.el.object3D;
        const pos = new THREE.Vector3();
        obj.getWorldPosition(pos);
        obj.lookAt(this.cam.position.x, this.cam.position.y, this.cam.position.z);
      }
    });
  </script>
</head>

<body>
  <a-scene
    background="color: #0b1020"
    renderer="colorManagement: true"
  >
    <!-- Cámara -->
    <a-entity id="rig" position="0 0 0">
      <a-camera id="cam" position="0 1.6 0"></a-camera>
    </a-entity>

    <!-- Controles VR: rayos para interactuar -->
    <a-entity
      id="rightHand"
      laser-controls="hand: right"
      raycaster="objects: .grabbable; far: 6"
      line="opacity: 0.8"
      ray-grabber="hand: right"
    ></a-entity>

    <a-entity
      id="leftHand"
      laser-controls="hand: left"
      raycaster="objects: .grabbable; far: 6"
      line="opacity: 0.6"
      ray-grabber="hand: left"
    ></a-entity>

    <!-- Luz -->
    <a-entity light="type: ambient; intensity: 0.85"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="2 4 1"></a-entity>

    <!-- Piso -->
    <a-plane rotation="-90 0 0" width="30" height="30" color="#111827"></a-plane>

    <!-- Mesa (contenedor para devolver bloques) -->
    <a-entity id="table">
      <a-box position="0 0.6 -1.4" width="2.8" height="0.2" depth="1.4" color="#1f2937"></a-box>
      <a-box position="0 0.3 -1.4" width="2.6" height="0.6" depth="1.2" color="#0b1220"></a-box>
    </a-entity>

    <!-- BLOQUES DESORDENADOS -->
    <a-entity
      id="blk_print" class="grabbable"
      code-block
      material="color:#2563eb; roughness:0.4"
      geometry="primitive: box; width:0.85; height:0.18; depth:0.28"
      position="-0.7 1.05 -1.35"
      rotation="0 0 0"
      data-text="print("
      data-homepos="-0.7 1.05 -1.35"
    >
      <a-plane width="0.82" height="0.16" position="0 0 0.141" color="#1e3a8a"></a-plane>
      <a-text billboard value="print(" align="center" color="#ffffff" width="2.2"
              position="0 0 0.151"></a-text>
    </a-entity>

    <a-entity
      id="blk_text" class="grabbable"
      code-block
      material="color:#2563eb; roughness:0.4"
      geometry="primitive: box; width:1.20; height:0.18; depth:0.28"
      position="0.2 1.05 -1.55"
      rotation="0 0 0"
      data-text="&quot;Hello World&quot;"
      data-homepos="0.2 1.05 -1.55"
    >
      <a-plane width="1.16" height="0.16" position="0 0 0.141" color="#1e3a8a"></a-plane>
      <a-text billboard value='"Hello World"' align="center" color="#ffffff" width="3.0"
              position="0 0 0.151"></a-text>
    </a-entity>

    <a-entity
      id="blk_close" class="grabbable"
      code-block
      material="color:#2563eb; roughness:0.4"
      geometry="primitive: box; width:0.45; height:0.18; depth:0.28"
      position="0.95 1.05 -1.25"
      rotation="0 0 0"
      data-text=")"
      data-homepos="0.95 1.05 -1.25"
    >
      <a-plane width="0.42" height="0.16" position="0 0 0.141" color="#1e3a8a"></a-plane>
      <a-text billboard value=")" align="center" color="#ffffff" width="2.0"
              position="0 0 0.151"></a-text>
    </a-entity>

    <!-- PANEL DE ARMADO (3 ranuras) -->
    <a-entity position="0 1.15 -0.9" rotation="0 0 0">
      <a-box width="2.2" height="0.35" depth="0.6" color="#0f172a" opacity="0.95"></a-box>

      <a-box position="-0.65 0.02 0" width="0.85" height="0.16" depth="0.28"
             material="color:#334155; opacity:0.7" slot="index: 0"></a-box>

      <a-box position="0.15 0.02 0" width="1.20" height="0.16" depth="0.28"
             material="color:#334155; opacity:0.7" slot="index: 1"></a-box>

      <a-box position="0.95 0.02 0" width="0.45" height="0.16" depth="0.28"
             material="color:#334155; opacity:0.7" slot="index: 2"></a-box>

      <a-text value="Suelta aquí en orden" color="#cbd5e1" width="3"
              position="-1.05 0.18 0.25"></a-text>
    </a-entity>

    <!-- Línea armada -->
    <a-entity position="-0.9 2.25 -1.6">
      <a-text value="Programa:" color="#93c5fd" width="3" position="0 0.15 0"></a-text>
      <a-text id="programLine" value="___ ___ ___" color="#e2e8f0" width="4" position="0 0 0"></a-text>
    </a-entity>

    <!-- Consola -->
    <a-entity position="-1.1 1.4 -2.2" rotation="0 15 0">
      <a-plane width="2.1" height="1.05" color="#0b1220" opacity="0.95"></a-plane>
      <a-text id="console" value="> Consola\n" position="-1.0 0.45 0.01" width="2.1"
              color="#a7f3d0" wrap-count="48"></a-text>
      <a-text value="Consola" position="-1.0 0.56 0.02" width="2" color="#93c5fd"></a-text>
    </a-entity>

    <!-- Tutor UI -->
    <a-entity position="0.9 1.75 -1.7" rotation="0 -15 0" game-manager>
      <a-plane width="2.4" height="1.2" color="#0f172a" opacity="0.92"></a-plane>
      <a-text id="uiTitle" value="..." position="-1.15 0.48 0.01" width="2.3" color="#e2e8f0"></a-text>
      <a-text id="uiBody" value="..." position="-1.15 0.25 0.01" width="2.3" color="#cbd5e1" wrap-count="56"></a-text>
    </a-entity>

    <a-text id="badge" value="✅ Nivel 1 completado" visible="false"
            position="-0.7 2.55 -1.2" width="4" color="#86efac"></a-text>
  </a-scene>
</body>
</html>
