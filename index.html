<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Quest 3 Puzzle - Manos (pinch) + Controles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <script>
    // ======================
    // Helpers
    // ======================
    function getText(blockEl) { return blockEl.getAttribute("data-text"); }

    function findBlockEntityFromHit(el) {
      // Si el rayo pega en un hijo (texto/plane), subimos al padre con code-block
      let cur = el;
      for (let i = 0; i < 10 && cur; i++) {
        if (cur.hasAttribute && cur.hasAttribute("code-block")) return cur;
        cur = cur.parentElement;
      }
      return null;
    }

    function worldPosOf(el) {
      const v = new THREE.Vector3();
      el.object3D.getWorldPosition(v);
      return v;
    }

    // ======================
    // Billboard: texto siempre mirando a la cámara
    // ======================
    AFRAME.registerComponent("billboard", {
      init() { this.cam = document.querySelector("#cam"); },
      tick() {
        if (!this.cam) return;
        this.el.object3D.lookAt(this.cam.object3D.position);
      }
    });

    // ======================
    // Slot (ranura)
    // ======================
    AFRAME.registerComponent("slot", {
      schema: { index: { type: "int" } },
      init() { this.filled = false; }
    });

    // ======================
    // Game Manager (lógica + tutor)
    // ======================
    AFRAME.registerComponent("game-manager", {
      init() {
        this.expected = ['print(', '"Hello World"', ')'];
        this.state = [null, null, null];

        this.uiTitle = document.querySelector("#uiTitle");
        this.uiBody  = document.querySelector("#uiBody");
        this.program = document.querySelector("#programLine");
        this.console = document.querySelector("#console");
        this.badge   = document.querySelector("#badge");

        this.setUI(
          "Nivel 1: arma print(\"Hello World\")",
          "✅ Puedes jugar con MANOS (pinch) o con CONTROLES.\n\n" +
          "MANOS: pellizca (índice+pulgar) para agarrar/soltar.\n" +
          "CONTROLES: rayo + gatillo para agarrar/soltar.\n\n" +
          "Orden:\n1) print(\n2) \"Hello World\"\n3) )"
        );
        this.setConsole("> Consola lista.\n");
        this.renderProgram();
      },

      setUI(t, b) {
        this.uiTitle.setAttribute("text", "value", t);
        this.uiBody.setAttribute("text", "value", b);
      },
      setConsole(v) { this.console.setAttribute("text", "value", v); },
      addConsole(line) {
        const cur = this.console.getAttribute("text").value;
        this.setConsole(cur + line);
      },

      renderProgram() {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const parts = [];
        for (let i = 0; i < 3; i++) {
          const s = slots.find(x => x.getAttribute("slot").index === i);
          const child = s.querySelector("[code-block]");
          parts.push(child ? getText(child) : "___");
        }
        this.program.setAttribute("text", "value", parts.join(" "));
      },

      trySnap(blockEl) {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const p = worldPosOf(blockEl);

        let best = null, bestD = 999;

        for (const s of slots) {
          if (s.components.slot.filled) continue;
          const sp = worldPosOf(s);
          const d = sp.distanceTo(p);
          if (d < bestD) { bestD = d; best = s; }
        }

        // SNAP amplio para que sea fácil en VR
        if (!best || bestD > 0.45) return false;

        const idx = best.getAttribute("slot").index;

        // Encajar en ranura
        best.appendChild(blockEl);
        blockEl.setAttribute("position", "0 0.10 0");
        blockEl.setAttribute("rotation", "0 0 0");
        best.components.slot.filled = true;

        // Validar
        const actual = getText(blockEl);
        const expected = this.expected[idx];

        if (actual === expected) {
          blockEl.setAttribute("material", "color: #22c55e; roughness: 0.4");
          this.state[idx] = "ok";
          this.explainOk(idx);
        } else {
          blockEl.setAttribute("material", "color: #ef4444; roughness: 0.4");
          this.state[idx] = "bad";
          this.explainBad(idx, expected, actual);
          setTimeout(() => this.resetSlot(idx), 900);
        }

        this.renderProgram();
        this.checkWin();
        return true;
      },

      resetSlot(idx) {
        const slots = Array.from(document.querySelectorAll("[slot]"));
        const s = slots.find(x => x.getAttribute("slot").index === idx);
        const b = s.querySelector("[code-block]");
        if (!b) return;

        s.components.slot.filled = false;
        this.state[idx] = null;

        const table = document.querySelector("#table");
        table.appendChild(b);
        b.setAttribute("position", b.getAttribute("data-homepos"));
        b.setAttribute("rotation", "0 0 0");
        b.setAttribute("material", "color: #2563eb; roughness: 0.4");

        this.renderProgram();
      },

      explainOk(idx) {
        if (idx === 0) {
          this.setUI("✅ Bien: print(", "print() es una función.\nSirve para MOSTRAR algo en la consola.\n\nAhora pon el texto dentro.");
        } else if (idx === 1) {
          this.setUI("✅ Bien: \"Hello World\"", "Esto es texto.\nTodo lo que esté entre comillas es lo que se imprime.");
        } else {
          this.setUI("✅ Bien: )", "Cierra el paréntesis.\nSin esto, la instrucción queda incompleta.");
        }
      },

      explainBad(idx, expected, actual) {
        let msg = `❌ Ese bloque no va aquí.\n\nEsperado: ${expected}\nPusiste: ${actual}\n\n`;
        if (idx === 0) msg += "Pista: primero va la acción (print).";
        if (idx === 1) msg += "Pista: en el centro va lo que quieres imprimir.";
        if (idx === 2) msg += "Pista: al final se cierra con ).";
        this.setUI("Reintenta", msg);
      },

      checkWin() {
        if (!this.state.every(x => x === "ok")) return;

        this.badge.setAttribute("visible", "true");
        this.addConsole("\n> Ejecutando: print(\"Hello World\")\n");
        this.addConsole("Hello World\n");
        this.addConsole("> OK\n");

        this.setUI(
          "🎉 Nivel 1 completado",
          "Armaste: print(\"Hello World\")\n\nResumen:\n- print(...) muestra en consola\n- \"Hello World\" es el contenido\n- ( y ) encierran lo que print recibe"
        );
      }
    });

    // ======================
    // Controles: laser + gatillo (fallback)
    // ======================
    AFRAME.registerComponent("controller-grabber", {
      init() {
        this.grabbed = null;

        this.el.addEventListener("triggerdown", () => this.grab());
        this.el.addEventListener("triggerup", () => this.drop());
        this.el.addEventListener("gripdown", () => this.grab());
        this.el.addEventListener("gripup", () => this.drop());
      },

      grab() {
        if (this.grabbed) return;

        const ray = this.el.components.raycaster;
        if (!ray || !ray.intersections || ray.intersections.length === 0) return;

        const rawHitEl = ray.intersections[0].object.el;
        const blockEl = findBlockEntityFromHit(rawHitEl);
        if (!blockEl) return;

        this.grabbed = blockEl;

        // Adjuntar al control
        this.el.object3D.add(blockEl.object3D);
        blockEl.object3D.position.set(0, 0, -0.18);

        blockEl.setAttribute("animation__grab", "property: scale; dur: 90; to: 1.07 1.07 1.07");
      },

      drop() {
        if (!this.grabbed) return;
        const blockEl = this.grabbed;

        const gm = document.querySelector("[game-manager]").components["game-manager"];
        const snapped = gm.trySnap(blockEl);

        if (!snapped) {
          const table = document.querySelector("#table");
          table.appendChild(blockEl);
          blockEl.setAttribute("position", blockEl.getAttribute("data-homepos"));
          blockEl.setAttribute("rotation", "0 0 0");
          blockEl.setAttribute("material", "color: #2563eb; roughness: 0.4");
        }

        blockEl.removeAttribute("animation__grab");
        blockEl.setAttribute("scale", "1 1 1");
        this.grabbed = null;
      }
    });

    // ======================
    // Manos: Pinch grab (hand tracking)
    // ======================
    // A-Frame hand-tracking-controls suele emitir:
    //   "pinchstarted" y "pinchended"
    // Si tu build del navegador/AFRAME no los emite, aún así tendrás controles.
    AFRAME.registerComponent("pinch-grabber", {
      schema: {
        grabRadius: { type: "number", default: 0.18 } // radio para “agarrar” cerca
      },
      init() {
        this.grabbed = null;

        // Debug opcional: muestra si llegan eventos
        // this.el.addEventListener("pinchstarted", (e) => console.log("pinchstarted", e));
        // this.el.addEventListener("pinchended", (e) => console.log("pinchended", e));

        this.el.addEventListener("pinchstarted", () => this.pinchGrab());
        this.el.addEventListener("pinchended", () => this.pinchDrop());
      },

      pinchGrab() {
        if (this.grabbed) return;

        const handPos = worldPosOf(this.el);

        // Busca el bloque más cercano dentro del radio
        const blocks = Array.from(document.querySelectorAll("[code-block]"));
        let best = null, bestD = 999;

        for (const b of blocks) {
          // si ya está dentro de una ranura llena, igual puedes impedirlo si quieres,
          // pero aquí lo dejamos libre para demo
          const bp = worldPosOf(b);
          const d = bp.distanceTo(handPos);
          if (d < bestD) { bestD = d; best = b; }
        }

        if (!best || bestD > this.data.grabRadius) return;

        this.grabbed = best;

        // Adjuntar a la mano (lo “tienes” pegado a la mano)
        this.el.object3D.add(best.object3D);
        best.object3D.position.set(0, 0, -0.08); // un poquito delante de la mano

        best.setAttribute("animation__grab", "property: scale; dur: 90; to: 1.07 1.07 1.07");
      },

      pinchDrop() {
        if (!this.grabbed) return;
        const blockEl = this.grabbed;

        const gm = document.querySelector("[game-manager]").components["game-manager"];
        const snapped = gm.trySnap(blockEl);

        if (!snapped) {
          const table = document.querySelector("#table");
          table.appendChild(blockEl);
          blockEl.setAttribute("position", blockEl.getAttribute("data-homepos"));
          blockEl.setAttribute("rotation", "0 0 0");
          blockEl.setAttribute("material", "color: #2563eb; roughness: 0.4");
        }

        blockEl.removeAttribute("animation__grab");
        blockEl.setAttribute("scale", "1 1 1");
        this.grabbed = null;
      }
    });
  </script>
</head>

<body>
  <!--
    WebXR:
    - optionalFeatures incluye hand-tracking (manos) y local-floor (suelo).
    - Funciona por HTTPS (GitHub Pages perfecto).
  -->
  <a-scene
    background="color: #0b1020"
    webxr="optionalFeatures: hand-tracking, local-floor;"
  >
    <!-- Cámara -->
    <a-entity id="rig" position="0 0 0">
      <a-camera id="cam" position="0 1.6 0"></a-camera>
    </a-entity>

    <!-- CONTROLES (fallback): laser + raycaster + grab -->
    <a-entity
      id="rightController"
      laser-controls="hand: right"
      raycaster="objects: .grabbable; far: 8; interval: 50"
      line="opacity: 0.9"
      controller-grabber
    ></a-entity>

    <a-entity
      id="leftController"
      laser-controls="hand: left"
      raycaster="objects: .grabbable; far: 8; interval: 50"
      line="opacity: 0.55"
      controller-grabber
    ></a-entity>

    <!-- MANOS: hand tracking + pinch grab -->
    <a-entity id="rightHand" hand-tracking-controls="hand: right" pinch-grabber="grabRadius: 0.18"></a-entity>
    <a-entity id="leftHand"  hand-tracking-controls="hand: left"  pinch-grabber="grabRadius: 0.18"></a-entity>

    <!-- Luces -->
    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 1.1" position="2 4 1"></a-entity>

    <!-- Piso -->
    <a-plane rotation="-90 0 0" width="30" height="30" color="#111827"></a-plane>

    <!-- Mesa -->
    <a-entity id="table">
      <a-box position="0 0.6 -1.25" width="2.9" height="0.2" depth="1.5" color="#1f2937"></a-box>
      <a-box position="0 0.3 -1.25" width="2.7" height="0.6" depth="1.3" color="#0b1220"></a-box>
    </a-entity>

    <!-- Bloques (grabbable + code-block) -->
    <a-entity class="grabbable" code-block
      geometry="primitive: box; width: 0.9; height: 0.2; depth: 0.3"
      material="color:#2563eb; roughness:0.4"
      position="-0.9 1.05 -1.05"
      rotation="0 0 0"
      data-text='print('
      data-homepos="-0.9 1.05 -1.05"
    >
      <a-plane width="0.88" height="0.18" position="0 0 0.151" color="#1e3a8a"></a-plane>
      <a-text billboard value="print(" align="center" width="3.0" color="#fff" position="0 0 0.165"></a-text>
    </a-entity>

    <a-entity class="grabbable" code-block
      geometry="primitive: box; width: 1.35; height: 0.2; depth: 0.3"
      material="color:#2563eb; roughness:0.4"
      position="0.0 1.05 -1.45"
      rotation="0 0 0"
      data-text='"Hello World"'
      data-homepos="0.0 1.05 -1.45"
    >
      <a-plane width="1.33" height="0.18" position="0 0 0.151" color="#1e3a8a"></a-plane>
      <a-text billboard value='"Hello World"' align="center" width="3.6" color="#fff" position="0 0 0.165"></a-text>
    </a-entity>

    <a-entity class="grabbable" code-block
      geometry="primitive: box; width: 0.55; height: 0.2; depth: 0.3"
      material="color:#2563eb; roughness:0.4"
      position="1.05 1.05 -1.1"
      rotation="0 0 0"
      data-text=')'
      data-homepos="1.05 1.05 -1.1"
    >
      <a-plane width="0.53" height="0.18" position="0 0 0.151" color="#1e3a8a"></a-plane>
      <a-text billboard value=")" align="center" width="3.0" color="#fff" position="0 0 0.165"></a-text>
    </a-entity>

    <!-- Panel de armado (ranuras) -->
    <a-entity position="0 1.25 -0.55" rotation="0 0 0">
      <a-box width="2.5" height="0.42" depth="0.7" color="#0f172a" opacity="0.95"></a-box>

      <a-box position="-0.78 0.03 0" width="0.9" height="0.2" depth="0.3"
             material="color:#334155; opacity:0.75" slot="index: 0"></a-box>

      <a-box position="0.10 0.03 0" width="1.35" height="0.2" depth="0.3"
             material="color:#334155; opacity:0.75" slot="index: 1"></a-box>

      <a-box position="1.07 0.03 0" width="0.55" height="0.2" depth="0.3"
             material="color:#334155; opacity:0.75" slot="index: 2"></a-box>

      <a-text value="Suelta aquí en orden" color="#cbd5e1" width="3.5"
              position="-1.18 0.22 0.30"></a-text>
    </a-entity>

    <!-- Línea armada -->
    <a-entity position="-1.1 2.25 -1.2">
      <a-text value="Programa:" color="#93c5fd" width="3.2" position="0 0.18 0"></a-text>
      <a-text id="programLine" value="___ ___ ___" color="#e2e8f0" width="4.8" position="0 0 0"></a-text>
    </a-entity>

    <!-- Consola -->
    <a-entity position="-1.2 1.42 -2.0" rotation="0 12 0">
      <a-plane width="2.2" height="1.1" color="#0b1220" opacity="0.95"></a-plane>
      <a-text id="console" value="> Consola\n" position="-1.05 0.46 0.01" width="2.2"
              color="#a7f3d0" wrap-count="50"></a-text>
      <a-text value="Consola" position="-1.05 0.59 0.02" width="2" color="#93c5fd"></a-text>
    </a-entity>

    <!-- Tutor (game-manager) -->
    <a-entity position="1.05 1.75 -1.55" rotation="0 -12 0" game-manager>
      <a-plane width="2.5" height="1.25" color="#0f172a" opacity="0.92"></a-plane>
      <a-text id="uiTitle" value="..." position="-1.2 0.5 0.01" width="2.4" color="#e2e8f0"></a-text>
      <a-text id="uiBody" value="..." position="-1.2 0.27 0.01" width="2.4" color="#cbd5e1" wrap-count="60"></a-text>
    </a-entity>

    <a-text id="badge" value="✅ Nivel 1 completado" visible="false"
            position="-0.9 2.55 -0.9" width="4.5" color="#86efac"></a-text>
  </a-scene>
</body>
</html>
